<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated portifolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white">
    <nav class="py-6">
      <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">Nuhamin</h1>

        <ul class="flex gap-8 text-sm">
          <li>
            <a href="#about" class="hover:text-blue-400 transition">About</a>
          </li>
          <li>
            <a href="#projects" class="hover:text-blue-400 transition"
              >Projects</a
            >
          </li>
          <li>
            <a href="#contact" class="hover:text-blue-400 transition"
              >Contact</a
            >
          </li>
        </ul>
      </div>
    </nav>
    <section class="py-20">
      <div
        class="max-w-6xl mx-auto px-4 flex flex-col items-center text-center"
      >
        <h1 class="text-5xl font-bold leading-tight">Hi, I'm Nuhamin</h1>

        <p class="mt-6 text-lg text-gray-400 max-w-xl">
          I am building modern web interfaces with clean design and smooth
          animations.
        </p>

        <button
          class="mt-8 px-6 py-3 bg-blue-600 rounded-lg hover:bg-blue-700 transition"
        >
          View Projects
        </button>
      </div>
    </section>
    <section id="about" class="py-20">
      <div
        class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row items-center gap-10"
      >
        <div class="flex-1">
          <img src="your-image.jpg" class="rounded-2xl" />
        </div>

        <div class="flex-1">
          <h2 class="text-3xl font-bold mb-4">About Me</h2>
          <p class="text-gray-400">
            I am passionate about building responsive and interactive web
            interfaces using Tailwind CSS.
          </p>
        </div>
      </div>
    </section>
  </body>
</html>
